<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>自定义客户端布局（原生HTML）</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1f2b;
      --panel-2: #202738;
      --line: #2d3650;
      --text: #e8ecf7;
      --muted: #9aa7c2;
      --accent: #4a8dff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 20%, #1a2133 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .dashboard {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 7fr 3fr;
      grid-template-rows: 7fr 3fr;
      border: 1px solid var(--line);
      background: #111522;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .top-video {
      display: grid;
      place-items: center;
      font-size: clamp(40px, 4vw, 70px);
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #151b2b, #0f1525);
    }

    .top-map {
      padding: 16px;
      font-size: clamp(18px, 1.4vw, 28px);
      line-height: 1.45;
      background: linear-gradient(135deg, #141b2d, #121a2a);
    }

    .bottom-left {
      display: flex;
      min-height: 0;
    }

    .actions {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      min-height: 0;
    }

    .cell {
      border: 1px solid var(--line);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
      font-size: clamp(16px, 1vw, 24px);
      user-select: none;
    }

    .dropdowns {
      flex: 0 0 16.6667%;
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      min-height: 0;
    }

    .dart {
      flex: 0 0 16.6667%;
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      min-height: 0;
    }

    .control {
      flex: 0 0 16.6667%;
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      min-height: 0;
    }

    .bottom-right {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: 100%;
      min-height: 0;
    }

    .left-info-top {
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: clamp(16px, 1vw, 24px);
      background: #212a3f;
    }

    .left-info-bottom {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      min-height: 0;
    }

    .status-list {
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      background: #1f2739;
      min-height: 0;
    }

    .status-list .item {
      border-bottom: 1px solid var(--line);
      padding: 4px 10px;
      display: flex;
      align-items: center;
      font-size: clamp(14px, 0.9vw, 22px);
    }

    .status-list .item:last-child { border-bottom: 0; }

    .blank {
      border: 1px solid var(--line);
      background: #1a2234;
    }

    .select-chip::after {
      content: "  |↓|";
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="panel top-video">图传</section>

    <section class="panel top-map">
      小地图（上下布局）<br />
      包含标点工具？
    </section>

    <section class="panel bottom-left">
      <div class="actions">
        <div class="cell">兑17mm弹</div>
        <div class="cell">兑42mm弹</div>
        <div class="cell">确认复活</div>

        <div class="cell">付费复活</div>
        <div class="cell">远程补弹</div>
        <div class="cell">远程回血</div>

        <div class="cell">激活能量机关</div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>

      <div class="dropdowns">
        <div class="cell select-chip">发射机构选项</div>
        <div class="cell select-chip">底盘选项</div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>

      <div class="dart">
        <div class="cell select-chip">飞镖目标</div>
        <div class="cell">开闸</div>
        <div class="cell">发射</div>
        <div class="cell"></div>
      </div>

      <div class="control">
        <div class="cell">开启部署</div>
        <div class="cell">退出部署</div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
    </section>

    <section class="panel bottom-right">
      <div class="left-info-top">剩余时间：总时间</div>

      <div class="status-list">
        <div class="item">己方基地状态</div>
        <div class="item">己方前哨状态</div>
        <div class="item">敌方基地状态</div>
        <div class="item">敌方前哨状态</div>
      </div>

      <div class="left-info-bottom">
        <div class="cell">经济：0</div>
        <div class="cell">科技等级</div>
        <div class="cell">总伤害（己）</div>
        <div class="cell">总伤害（敌）</div>
      </div>

      <div class="blank"></div>
    </section>
  </main>
</body>
</html>
