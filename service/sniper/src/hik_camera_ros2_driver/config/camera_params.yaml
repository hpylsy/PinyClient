/hik_camera_ros2_driver:
  ros__parameters:
    camera_info_url: "package://hik_camera_ros2_driver/config/camera_info.yaml"
    pixel_format: "BayerRG8"        # Recommended Option: "RGB8Packed", "BayerRG8"
    use_sensor_data_qos: false
    # camera_name: "camera"
    # frame_id: "optical_frame"     # If not set, it will be set as <camera_name>_optical_frame
    # camera_topic: "image"         # If not set, it will be set as <camera_name>/image
    camera_serial: "DA2166373"    # Copy from MVS
    enable_ros_publish: true         # true: publish ROS2 image topic; false: disable ROS2 publish

    acquisition_frame_rate: 249.1   # Unit: Hz
    exposure_time: 4000             # Unit: us
    gain: 16.0                     # Range: 0.0 ~ 16.9, Unit: dB

    # Same-frame dual output:
    # 1) ROS2 topic publish
    # 2) Optional shared-memory output for non-ROS2 local programs
    enable_shm_output: true
    shm_name: "/hik_camera_rgb"
    shm_max_bytes: 0
