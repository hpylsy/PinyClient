syntax = "proto3";

// RoboMaster 2026 自定义客户端通信协议 V1.3.0 (20260326)

// === 上行消息 (Client -> Server) ===

// 传输鼠标键盘输入 (75Hz)
// keyboard_value: bit0=W, bit1=S, bit2=A, bit3=D, bit4=Shift, bit5=Ctrl,
//   bit6=Q, bit7=E, bit8=R, bit9=F, bit10=G, bit11=Z, bit12=X, bit13=C, bit14=V, bit15=B
message KeyboardMouseControl {
    int32 mouse_x = 1;
    int32 mouse_y = 2;
    int32 mouse_z = 3;
    bool left_button_down = 4;
    bool right_button_down = 5;
    uint32 keyboard_value = 6;
    bool mid_button_down = 7;
}

// 最大30字节自定义数据 (75Hz, 对应串口 0x0311)
message CustomControl {
    bytes data = 1;
}

// 云台手地图点击标记 (触发式)
// is_send_all: 0=指定客户端, 1=除哨兵, 2=包含哨兵
// mode: 1=攻击, 2=防御, 3=警戒, 4=自定义
// type: 1=地图, 2=对方机器人
message MapClickInfoNotify {
    uint32 is_send_all = 1;
    bytes robot_id = 2;
    uint32 mode = 3;
    uint32 enemy_id = 4;
    uint32 ascii = 5;
    uint32 type = 6;
    float map_x = 7;
    float map_y = 8;
}

// 工程装配指令 (1Hz)
// operation: 0=开始兑换, 1=确认装配, 2=取消装配
message AssemblyCommand {
    uint32 operation = 1;
    uint32 difficulty = 2;
}

// 地面机器人选择性能体系 (1Hz)
// shooter: 1=冷却优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
// chassis: 1=血量优先, 2=功率优先, 3=英雄近战优先, 4=英雄远程优先
// sentry_control: 0=自动控制, 1=半自动控制
message RobotPerformanceSelectionCommand {
    uint32 shooter = 1;
    uint32 chassis = 2;
    uint32 sentry_control = 3;
}

// 机器人多种常用指令 (触发式, 最高10Hz)
// cmd_type: 1=兑换17mm发弹量, 2=兑换42mm发弹量, 3=确认复活,
//   4=兑换立即复活, 5=远程兑换允许发弹量, 6=远程兑换血量
message CommonCommand {
    uint32 cmd_type = 1;
    uint32 param = 2;
}

// 英雄部署模式指令 (1Hz)
// mode: 0=退出, 1=进入
message HeroDeployModeEventCommand {
    uint32 mode = 1;
}

// 能量机关激活指令 (1Hz)
message RuneActivateCommand {
    uint32 activate = 1;
}

// 飞镖控制指令 (1Hz)
// target_id: 1=前哨站, 2=基地固定目标, 3=基地随机固定目标, 4=基地随机移动目标, 5=基地末端移动目标
message DartCommand {
    uint32 target_id = 1;
    bool open = 2;
    bool launch_confirm = 3;
}

// 哨兵控制指令请求 (1Hz)
// command_id: 1=补血点补弹, 2=补给站实体补弹, 3=远程补弹, 4=远程回血,
//   5=确认复活, 6=花费金币复活, 7=进攻姿态, 8=防御姿态, 9=移动姿态
message SentryCtrlCommand {
    uint32 command_id = 1;
}

// 空中支援指令 (1Hz)
// command_id: 0=取消空中支援, 1=免费呼叫, 2=花费金币呼叫
message AirSupportCommand {
    uint32 command_id = 1;
}

// =================================================

// === 下行消息 (Server -> Client) ===

// 比赛全局状态 (5Hz)
// current_stage: 0=未开始, 1=准备阶段, 2=自检, 3=五秒倒计时, 4=比赛中, 5=结算中
message GameStatus {
    uint32 current_round = 1;
    uint32 total_rounds = 2;
    uint32 red_score = 3;
    uint32 blue_score = 4;
    uint32 current_stage = 5;
    int32 stage_countdown_sec = 6;
    int32 stage_elapsed_sec = 7;
    bool is_paused = 8;
}

// 基地、前哨站和所有机器人状态 (1Hz)
// base_status: 0=无敌, 1=解除无敌护甲未展开, 2=解除无敌护甲展开
// outpost_status: 0=无敌, 1=存活装甲旋转, 2=存活装甲停转, 3=击毁不可重建, 4=击毁可重建, 5=击毁重建中
message GlobalUnitStatus {
    uint32 base_health = 1;
    uint32 base_status = 2;
    uint32 base_shield = 3;
    uint32 outpost_health = 4;
    uint32 outpost_status = 5;
    uint32 enemy_base_health = 6;
    uint32 enemy_base_status = 7;
    uint32 enemy_base_shield = 8;
    uint32 enemy_outpost_health = 9;
    uint32 enemy_outpost_status = 10;
    repeated uint32 robot_health = 11;
    repeated int32 robot_bullets = 12;
    uint32 total_damage_ally = 13;
    uint32 total_damage_enemy = 14;
}

// 全局后勤信息 (1Hz)
message GlobalLogisticsStatus {
    uint32 remaining_economy = 1;
    uint64 total_economy_obtained = 2;
    uint32 tech_level = 3;
    uint32 encryption_level = 4;
}

// 正在生效的全局特殊机制 (1Hz)
// mechanism_id: 1=己方堡垒被对方占领计时, 2=对方堡垒被己方占领计时
message GlobalSpecialMechanism {
    repeated uint32 mechanism_id = 1;
    repeated int32 mechanism_time_sec = 2;
}

// 全局事件通知 (触发式)
// event_id: 1=击杀, 2=前哨站摧毁, 3=大能量机关激活结果, 4=能量机关进入已激活,
//   5=己方英雄狙击伤害, 6=对方英雄狙击伤害, 7=对方呼叫空中支援,
//   8=对方空中支援被反制, 9=飞镖命中, 10=对方飞镖闸门开启,
//   11=基地遭攻击, 12=对方前哨站停转, 13=对方基地护甲展开,
//   14=对方请求四级装配强制退出缓冲, 15=装配结果
message Event {
    int32 event_id = 1;
    string param = 2;
}

// 机器人累计受伤统计 (1Hz)
message RobotInjuryStat {
    uint32 total_damage = 1;
    uint32 collision_damage = 2;
    uint32 small_projectile_damage = 3;
    uint32 large_projectile_damage = 4;
    uint32 dart_splash_damage = 5;
    uint32 module_offline_damage = 6;
    uint32 offline_damage = 7;
    uint32 penalty_damage = 8;
    uint32 server_kill_damage = 9;
    uint32 killer_id = 10;
}

// 机器人复活状态 (1Hz)
message RobotRespawnStatus {
    bool is_pending_respawn = 1;
    uint32 total_respawn_progress = 2;
    uint32 current_respawn_progress = 3;
    bool can_free_respawn = 4;
    uint32 gold_cost_for_respawn = 5;
    bool can_pay_for_respawn = 6;
}

// 机器人固定属性和配置 (1Hz)
// connection_state: 0=未连接, 1=已连接
// field_state: 0=已上场, 1=未上场
// alive_state: 0=未知, 1=存活, 2=战亡
message RobotStaticStatus {
    uint32 connection_state = 1;
    uint32 field_state = 2;
    uint32 alive_state = 3;
    uint32 robot_id = 4;
    uint32 robot_type = 5;
    uint32 performance_system_shooter = 6;
    uint32 performance_system_chassis = 7;
    uint32 level = 8;
    uint32 max_health = 9;
    uint32 max_heat = 10;
    float heat_cooldown_rate = 11;
    uint32 max_power = 12;
    uint32 max_buffer_energy = 13;
    uint32 max_chassis_energy = 14;
}

// 机器人实时数据 (10Hz)
message RobotDynamicStatus {
    uint32 current_health = 1;
    float current_heat = 2;
    float last_projectile_fire_rate = 3;
    uint32 current_chassis_energy = 4;
    uint32 current_buffer_energy = 5;
    uint32 current_experience = 6;
    uint32 experience_for_upgrade = 7;
    uint32 total_projectiles_fired = 8;
    uint32 remaining_ammo = 9;
    bool is_out_of_combat = 10;
    uint32 out_of_combat_countdown = 11;
    bool can_remote_heal = 12;
    bool can_remote_ammo = 13;
}

// 机器人各模块运行状态 (1Hz)
// 状态值: 0=离线, 1=在线, 2=因安装不规范被视为离线
message RobotModuleStatus {
    uint32 power_manager = 1;
    uint32 rfid = 2;
    uint32 light_strip = 3;
    uint32 small_shooter = 4;
    uint32 big_shooter = 5;
    uint32 uwb = 6;
    uint32 armor = 7;
    uint32 video_transmission = 8;
    uint32 capacitor = 9;
    uint32 main_controller = 10;
    uint32 laser_detection_module = 11;
}

// 机器人空间坐标和朝向 (1Hz)
message RobotPosition {
    float x = 1;
    float y = 2;
    float z = 3;
    float yaw = 4;
    uint32 robot_id = 5;
}

// Buff效果信息 (获得增益触发, 此后1Hz)
// buff_type: 1=攻击, 2=防御, 3=射击热量冷却, 4=底盘功率, 5=回血, 6=可兑换允许发弹量, 7=地形跨越预备
message Buff {
    uint32 robot_id = 1;
    uint32 buff_type = 2;
    int32 buff_level = 3;
    uint32 buff_max_time = 4;
    uint32 buff_left_time = 5;
}

// 判罚信息 (触发式)
// penalty_type: 1=黄牌, 2=双方黄牌, 3=红牌, 4=超功率, 5=超热量, 6=超射速
message PenaltyInfo {
    uint32 penalty_type = 1;
    uint32 penalty_effect_sec = 2;
    uint32 total_penalty_num = 3;
}

// 哨兵轨迹规划信息 (1Hz)
// intention: 1=攻击, 2=防守, 3=移动
message RobotPathPlanInfo {
    uint32 intention = 1;
    uint32 start_pos_x = 2;
    uint32 start_pos_y = 3;
    repeated int32 offset_x = 4 [packed = true];
    repeated int32 offset_y = 5 [packed = true];
    uint32 sender_id = 6;
}

// 单个机器人雷达位置信息
// is_high_light: 0=否, 1=是, 2=是但定位模块离线
message RadarSingleRobotInfo {
    uint32 target_pos_x = 1;
    uint32 target_pos_y = 2;
    uint32 is_high_light = 3;
}

// 雷达发送的所有机器人位置信息 (触发式)
// 顺序: 对方1/2/3/4/6/7, 己方1/2/3/4/6/7
message RadarInfoToClient {
    repeated RadarSingleRobotInfo robot_info = 1;
}

// 机器人自定义上传数据流 (50Hz, 对应串口 0x0310)
message CustomByteBlock {
    bytes data = 1;
}

// 科技核心运动状态同步 (1Hz)
// basic_state: 1=初始位置, 2=运动中, 3=已到达对应位姿
// putin_state/move_state/rotate_state: 0=未完成, 1=已完成
// enemy_core_status: 0=对方没有正在装配, 1=对方装配非四级, 2=对方装配四级
message TechCoreMotionStateSync {
    uint32 maximum_difficulty_level = 1;
    uint32 basic_state = 2;
    uint32 putin_state = 3;
    uint32 move_state = 4;
    uint32 rotate_state = 5;
    uint32 enemy_core_status = 6;
    uint32 remain_time_all = 7;
    uint32 remain_time_step = 8;
}

// 步兵/英雄性能体系状态同步 (1Hz)
message RobotPerformanceSelectionSync {
    uint32 shooter = 1;
    uint32 chassis = 2;
    uint32 sentry_control = 3;
}

// 英雄部署模式状态同步 (1Hz)
// status: 0=未部署, 1=已部署
message DeployModeStatusSync {
    uint32 status = 1;
}

// 能量机关状态同步 (1Hz)
// rune_status: 1=未激活, 2=正在激活, 3=已激活
message RuneStatusSync {
    uint32 rune_status = 1;
    uint32 activated_arms = 2;
    float average_rings = 3;
}

// 哨兵姿态和弱化状态 (1Hz)
// posture_id: 1=进攻, 2=防御, 3=移动
message SentryStatusSync {
    uint32 posture_id = 1;
    bool is_weakened = 2;
}

// 飞镖目标选择状态同步 (1Hz)
// open: 0=关闭, 1=开启中, 2=已开启
message DartSelectTargetStatusSync {
    uint32 target_id = 1;
    uint32 open = 2;
}

// 哨兵控制指令结果反馈 (1Hz)
// result_code: 0=成功, 其他=失败
message SentryCtrlResult {
    uint32 command_id = 1;
    uint32 result_code = 2;
}

// 空中支援状态反馈 (1Hz)
// airsupport_status: 0=未进行, 1=正在空中支援
// shooter_status: 0=发射机构因雷达反制被锁定, 1=正常未被反制
message AirSupportStatusSync {
    uint32 airsupport_status = 1;
    uint32 left_time = 2;
    uint32 cost_coins = 3;
    uint32 is_being_targeted = 4;
    uint32 shooter_status = 5;
}
