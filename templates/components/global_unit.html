<div class="component-panel component-global-unit">
    <div class="component-title">全局单位状态</div>
    <div class="component-grid four-cols">
        <div class="metric">
            <span class="metric-label">我方基地</span>
            <strong data-field="base_health">{{ base_health }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">基地护盾</span>
            <strong data-field="base_shield">{{ base_shield }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">我方前哨</span>
            <strong data-field="outpost_health">{{ outpost_health }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">敌方基地</span>
            <strong data-field="enemy_base_health">{{ enemy_base_health }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">敌方护盾</span>
            <strong data-field="enemy_base_shield">{{ enemy_base_shield }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">敌方前哨</span>
            <strong data-field="enemy_outpost_health">{{ enemy_outpost_health }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">我方伤害</span>
            <strong data-field="total_damage_ally">{{ total_damage_ally }}</strong>
        </div>
        <div class="metric">
            <span class="metric-label">敌方伤害</span>
            <strong data-field="total_damage_enemy">{{ total_damage_enemy }}</strong>
        </div>
    </div>
</div>
